{{ define "main" }}
<div class="container py-4">
  <article>
    <h1>{{ .Title }}</h1>
    {{ $toc := .TableOfContents }} {{ if findRE "
    <li>
      " $toc }}
      <nav class="toc">
        <details open>
          <summary>On this page</summary>
          {{ $toc }}
        </details>
      </nav>
      {{ end }} {{ .Content }} {{ range .Pages }}
      <section>
        <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        {{ with .Description }}
        <p>{{ . }}</p>
        {{ end }}
      </section>
      {{ end }}
    </li>
  </article>
</div>
{{ end }}
