<footer class="container py-3 small">
  <div class="footer-row">
    <p class="text-muted mb-0">
      &copy; {{ now.Year }}
      <a href="https://priyashpatil.com" target="_blank" rel="noopener noreferrer">Priyash Patil</a>
    </p>

    <div class="footer-links">
      <a href="/privacy/">Privacy</a>
      <a href="/terms/">Terms</a>
      <a
        class="github-link github-link--footer"
        href="https://github.com/priyashpatil/rift"
        target="_blank"
        rel="noopener noreferrer"
      >
        {{ partial "icons/github.html" (dict "size" 14) }}
        <span>rift</span>
        <span class="github-star-count" aria-label="stars">
          {{ partial "icons/star.html" (dict "size" 11) }}
          <span data-count></span>
        </span>
      </a>
    </div>
  </div>
</footer>
